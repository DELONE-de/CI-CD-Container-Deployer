name: CDK Synth

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  synth:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: CDK Synth
        run: npx cdk synth
        env:
          GITHUB_CONNECTION_ARN: ${{secrets.GITHUBCONNECTION_ARN}}
          GITHUB_OWNER: ${{secrets.GITHUBOWNER}}
          GITHUB_REPO: ${{secrets.GITHUBREPO}}
